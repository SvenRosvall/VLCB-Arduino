name: Arduino Firmware Build

env:
  # Fix for NodeJS 24 until action arduino/setup-arduino-cli is fixed.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  pull_request:
    paths:
      - examples/**
      - src/**
      - library.properties
      - .github/workflows/ci-arduino-build.yml
  push:
    paths:
      - examples/**
      - src/**
      - library.properties
      - .github/workflows/ci-arduino-build.yml
  workflow_dispatch:

jobs:
  compile-examples:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Install library dependencies
        run: |
          arduino-cli lib install Streaming

      - name: Compile all examples for Arduino Uno
        run: |
          results=""
          for dir in ./examples/*; do
            if [ -d "$dir" ] && ls "$dir"/*.ino >/dev/null 2>&1; then
              exname=$(basename "$dir")
              echo "Compiling $dir"
              if arduino-cli compile --fqbn arduino:avr:uno --library . "$dir"; then
                results="$results  PASS  $exname"$'\n'
              else
                results="$results  FAIL  $exname"$'\n'
              fi
            fi
          done
          echo "=== Summary ==="
          echo "$results"
          if echo "$results" | grep -q "^  FAIL"; then
            exit 1
          fi
